<script>
  const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxTV9TY6GSa8flkj4vmSuppvULwOpzdX7DeyHfRWm0PayfM0T0t6taYZuPPfwb6ffiW/exec';

  const screens = {
    rating: document.getElementById('screen-rating'),
    lead: document.getElementById('screen-lead'),
    confirm: document.getElementById('screen-confirm')
  };

  let currentRating = 0;

  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  document.getElementById('stars-container').addEventListener('click', (e) => {
    if (e.target.classList.contains('star')) {
      currentRating = e.target.dataset.value;
      showScreen('lead');
    }
  });

  document.getElementById('btn-unlock').addEventListener('click', function() {
    const nome = document.getElementById('lead-name').value;
    const telefono = document.getElementById('lead-phone').value;
    const btn = this;

    if (!nome || !telefono) return alert("Inserisci i dati!");

    btn.innerText = "⏳ Invio...";
    btn.disabled = true;

    // TRUCCO FINALE: Invio tramite immagine (Beacon)
    // Questo bypassa tutti i blocchi di sicurezza del browser
    const invioUrl = WEBHOOK_URL + "?nome=" + encodeURIComponent(nome) + 
                     "&telefono=" + encodeURIComponent(telefono) + 
                     "&rating=" + encodeURIComponent(currentRating);
    
    const img = new Image();
    img.src = invioUrl;

    // Mostra la conferma dopo 1 secondo, a prescindere
    setTimeout(() => {
      showScreen('confirm');
    }, 1000);
  });
</script>
