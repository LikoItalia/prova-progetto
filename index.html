<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La tua esperienza</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #c9a84c; --cream: #fdf6ec; --dark: #1a1208; --soft: #7a6a50; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .screen { background: #fff; border-radius: 28px; padding: 2.5rem 2rem; box-shadow: 0 8px 48px rgba(0,0,0,0.1); max-width: 420px; width: 100%; display: none; }
    .screen.active { display: block; }
    .stars { display: flex; gap: 10px; justify-content: center; margin: 1.5rem 0; }
    .star { font-size: 2.6rem; cursor: pointer; color: #d9cfc0; transition: transform 0.2s; }
    .star:hover { transform: scale(1.2); }
    .btn-gold { background: var(--gold); color: #fff; border-radius: 100px; padding: 0.9rem; width: 100%; font-weight: 600; margin-top: 1rem; }
    .field { width: 100%; background: #faf7f2; border: 1.5px solid #e8dfc8; border-radius: 14px; padding: 0.85rem; margin-bottom: 0.85rem; outline: none; }
  </style>
</head>
<body>

<div id="app">
  <div id="screen-rating" class="screen active">
    <h1 style="font-family:'Playfair Display'; text-align:center; font-size: 1.5rem; font-weight: bold;">Come valuti la tua esperienza?</h1>
    <div class="stars" id="stars-container">
      <span class="star" data-value="1">★</span>
      <span class="star" data-value="2">★</span>
      <span class="star" data-value="3">★</span>
      <span class="star" data-value="4">★</span>
      <span class="star" data-value="5">★</span>
    </div>
  </div>

  <div id="screen-lead" class="screen">
    <h2 style="font-family:'Playfair Display'; text-align:center; font-size: 1.5rem; font-weight: bold;">Ottimo! 🎉</h2>
    <p style="text-align:center; margin-bottom: 1rem;">Inserisci i dati per il regalo:</p>
    <input type="text" id="lead-name" class="field" placeholder="Il tuo nome" />
    <input type="tel" id="lead-phone" class="field" placeholder="WhatsApp" />
    <button class="btn-gold" id="btn-unlock">SBLOCCA REGALO 🎁</button>
  </div>

  <div id="screen-confirm" class="screen">
    <h2 style="text-align:center;">✅ Grazie!</h2>
    <p style="text-align:center;">Il regalo è in arrivo.</p>
  </div>
</div>

<script>
  const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwOHL3KoHXvfXA4JMwyJzdInUs_CkvOzA U3SnQyivjmksqC1ppLlIH5mioS2s67tvrG/exec".replace(/\s/g, '');

  document.getElementById('stars-container').addEventListener('click', (e) => {
    if(e.target.classList.contains('star')) {
      const val = e.target.dataset.value;
      document.querySelectorAll('.star').forEach((s, i) => s.style.color = i < val ? '#c9a84c' : '#d9cfc0');
      setTimeout(() => {
        document.getElementById('screen-rating').classList.remove('active');
        document.getElementById('screen-lead').classList.add('active');
      }, 400);
    }
  });

  document.getElementById('btn-unlock').addEventListener('click', async () => {
    const nome = document.getElementById('lead-name').value;
    const tel = document.getElementById('lead-phone').value;
    if(!nome || !tel) return alert("Compila tutto!");

    document.getElementById('btn-unlock').innerText = "Invio...";
    
    try {
      await fetch(GOOGLE_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({nome: nome, telefono: tel, rating: 5})
      });
    } catch(e) {}

    document.getElementById('screen-lead').classList.remove('active');
    document.getElementById('screen-confirm').classList.add('active');
  });
</script>
</body>
</html>
