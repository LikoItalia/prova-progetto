<script>
  // URL del tuo Google Script aggiornato
  const scriptURL = 'https://script.google.com/macros/s/AKfycbwbqvxy_lUF4lKcPodlt9PmLL4ohDrPziG5_X22TKPdG-v_Z6_0EIuuZHV4-8RF1UTI/exec';
  
  let currentRating = 0;

  // Gestione delle stelline (per farle illuminare)
  document.querySelectorAll('.star').forEach(star => {
    star.addEventListener('click', () => {
      currentRating = star.getAttribute('data-value');
      document.querySelectorAll('.star').forEach(s => {
        s.style.color = s.getAttribute('data-value') <= currentRating ? 'var(--gold)' : '#d9cfc0';
      });
      // Dopo il voto, passa alla schermata dati (se il tuo sito lo prevede)
      setTimeout(() => {
        document.getElementById('screen-rating').classList.remove('active');
        document.getElementById('screen-form').classList.add('active');
      }, 400);
    });
  });

  // Funzione per inviare i dati al foglio Google
  function inviaDati() {
    const nome = document.querySelector('input[placeholder="Il tuo nome"]').value;
    const numero = document.querySelector('input[placeholder="Il tuo numero"]').value;

    if(!nome || !numero) {
      alert("Per favore, inserisci nome e numero.");
      return;
    }

    const data = {
      nome: nome,
      numero: numero,
      rating: currentRating
    };

    fetch(scriptURL, { 
      method: 'POST', 
      mode: 'no-cors',
      cache: 'no-cache',
      body: JSON.stringify(data) 
    })
    .then(() => {
      alert('Grazie! Riceverai il tuo regalo su WhatsApp 🎁');
      location.reload(); // Ricarica la pagina per resettare
    })
    .catch(error => console.error('Errore!', error.message));
  }
  
  // Collega la funzione al tuo bottone finale
  // Assicurati che il tuo bottone abbia: onclick="inviaDati()"
</script>
