<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recensione Liko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fdf6ec; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 90%; max-width: 380px; text-align: center; }
        .star { font-size: 42px; cursor: pointer; color: #d9cfc0; transition: 0.2s; padding: 0 4px; }
        .star.active { color: #c9a84c; }
        .hidden { display: none; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #e8dfc8; border-radius: 12px; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #c9a84c; }
        button { background: #c9a84c; color: white; border: none; padding: 16px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card" id="step1">
    <h2 class="text-xl font-bold mb-6 text-gray-800">Come valuti la tua esperienza?</h2>
    <div class="flex justify-center mb-4">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
    </div>
    <p class="text-gray-400 text-sm">Tocca una stella per iniziare</p>
</div>

<div class="card hidden" id="step2">
    <h2 class="text-xl font-bold mb-4 text-gray-800">Ottimo! Dove inviamo il regalo?</h2>
    <input type="text" id="nome" placeholder="Il tuo nome">
    <input type="tel" id="numero" placeholder="Il tuo numero WhatsApp">
    <button id="btn-invio" onclick="spedisciTutto()">Ricevi il regalo 🎁</button>
</div>

<script>
    // IL TUO NUOVO URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwhJXzvh2Z0vuro5yzUnN9cyHaNU-PHEOgHM1sdGyODymLtPOZ2wj0wspcr3BshcH_1/exec';
    
    let voto = 0;

    function setRating(n) {
        voto = n;
        // Effetto visivo stelle
        const stars = document.querySelectorAll('.star');
        stars.forEach((s, i) => { s.classList.toggle('active', i < n); });
        
        // Passa al modulo dopo un piccolo delay
        setTimeout(() => {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }, 300);
    }

    function spedisciTutto() {
        const nome = document.getElementById('nome').value;
        const numero = document.getElementById('numero').value;
        const btn = document.getElementById('btn-invio');

        if(!nome || !numero) {
            alert("Per favore, inserisci nome e numero!");
            return;
        }

        btn.innerText = "Invio in corso...";
        btn.disabled = true;

        // Costruiamo l'invio "sicuro" via URL
        const urlFinale = scriptURL + "?nome=" + encodeURIComponent(nome) + "&numero=" + encodeURIComponent(numero) + "&rating=" + voto;
        
        // Usiamo Image per bypassare ogni blocco sicurezza (massima compatibilità)
        const img = new Image();
        img.src = urlFinale;

        // Diamo tempo al sistema di processare e mostriamo il ringraziamento
        setTimeout(() => {
            alert("Grazie! Riceverai il tuo regalo su WhatsApp 🎁");
            window.location.reload();
        }, 1000);
    }
</script>

</body>
</html>
