<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La tua esperienza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fdf6ec; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .star { font-size: 40px; cursor: pointer; color: #ccc; }
        .star.active { color: #c9a84c; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e8dfc8; border-radius: 10px; outline: none; font-size: 16px; }
        button { background: #c9a84c; color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card" id="step1">
    <h2 style="font-size: 22px; font-weight: bold; margin-bottom: 20px;">Come valuti la tua esperienza?</h2>
    <div id="rating-stars">
        <span class="star" onclick="setRating(1)">★</span>
        <span class="star" onclick="setRating(2)">★</span>
        <span class="star" onclick="setRating(3)">★</span>
        <span class="star" onclick="setRating(4)">★</span>
        <span class="star" onclick="setRating(5)">★</span>
    </div>
</div>

<div class="card hidden" id="step2">
    <h2 style="font-size: 22px; font-weight: bold;">Dove ti mandiamo il regalo?</h2>
    <input type="text" id="nome" placeholder="Il tuo nome">
    <input type="tel" id="numero" placeholder="Il tuo numero">
    <button onclick="spedisciTutto()">Ricevi il regalo 🎁</button>
</div>

<script>
    // URL DI OGGI (VERSIONE 5/6)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzic3JXWsNiPuv2UDYZfUbdAWxS_CAz0dWG-sQP3RV8c9pzBa2Up-SLuBsvJ5zoXkOe/exec';
    
    let voto = 0;

    function setRating(n) {
        voto = n;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    }

    function spedisciTutto() {
        const nome = document.getElementById('nome').value;
        const numero = document.getElementById('numero').value;

        if(!nome || !numero) { alert("Metti i dati!"); return; }

        // Metodo iper-semplice che ha funzionato ieri
        const urlFinale = scriptURL + "?nome=" + encodeURIComponent(nome) + "&numero=" + encodeURIComponent(numero) + "&rating=" + voto;
        
        // Invio silenzioso
        fetch(urlFinale, { method: 'GET', mode: 'no-cors' });

        alert("Grazie! Riceverai il tuo regalo su WhatsApp 🎁");
        window.location.reload();
    }
</script>

</body>
</html>
