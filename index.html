<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recensione Liko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fdf6ec; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 90%; max-width: 380px; text-align: center; }
        .star { font-size: 45px; cursor: pointer; color: #d9cfc0; transition: 0.2s; }
        .star.active { color: #c9a84c; }
        .hidden { display: none; }
        input { width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #e8dfc8; border-radius: 12px; outline: none; font-size: 16px; }
        button { background: #c9a84c; color: white; border: none; padding: 16px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card" id="step1">
    <h2 class="text-xl font-bold mb-6 text-gray-800">Come valuti la tua esperienza?</h2>
    <div class="flex justify-around mb-4">
        <span class="star" onclick="vota(1)">★</span>
        <span class="star" onclick="vota(2)">★</span>
        <span class="star" onclick="vota(3)">★</span>
        <span class="star" onclick="vota(4)">★</span>
        <span class="star" onclick="vota(5)">★</span>
    </div>
</div>

<div class="card hidden" id="step2">
    <h2 class="text-xl font-bold mb-4 text-gray-800">Dove inviamo il regalo?</h2>
    <input type="text" id="nome" placeholder="Il tuo nome">
    <input type="tel" id="numero" placeholder="Il tuo numero WhatsApp">
    <button id="btn" onclick="invia()">Ricevi il regalo 🎁</button>
</div>

<script>
    // IL TUO NUOVISSIMO URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyKi4mgXpdPaKRFi_9YeNUQLD-mY5FizoJK-k_B5b3smoomwMdkqZYrl1KT4hi1e_km/exec';
    
    let rating = 0;

    function vota(n) {
        rating = n;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    }

    function invia() {
        const nome = document.getElementById('nome').value;
        const numero = document.getElementById('numero').value;
        const btn = document.getElementById('btn');

        if(!nome || !numero) return alert("Inserisci i dati!");

        btn.innerText = "Invio...";
        btn.disabled = true;

        // Metodo "Image Beacon": il più potente per evitare blocchi
        const finale = scriptURL + "?nome=" + encodeURIComponent(nome) + "&numero=" + encodeURIComponent(numero) + "&rating=" + rating;
        
        const img = new Image();
        img.src = finale;

        // Aspettiamo un secondo e confermiamo
        setTimeout(() => {
            alert("Grazie! Riceverai il tuo regalo su WhatsApp 🎁");
            location.reload();
        }, 1000);
    }
</script>

</body>
</html>
